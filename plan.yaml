# pciv pipeline configuration. All model ids, retries, timeouts, budgets,
# and gate behavior live here. No hardcoded model strings in Python.
#
# `deployment` values below are PLACEHOLDER Azure OpenAI deployment names.
# Override them to match your Azure OpenAI resource; the canonical way is
# via environment variables read by the adapter:
#
#   AZURE_OPENAI_ENDPOINT
#   AZURE_OPENAI_API_KEY
#   AZURE_OPENAI_PLANNER_DEPLOYMENT     -> replaces planner deployment
#   AZURE_OPENAI_CRITIC_DEPLOYMENT      -> replaces critic deployment
#   AZURE_OPENAI_IMPLEMENTER_DEPLOYMENT -> replaces implementer deployment
#   AZURE_OPENAI_VERIFIER_DEPLOYMENT    -> replaces verifier deployment
#
# See the Azure OpenAI models catalog for the list of model ids that can
# back a deployment: https://learn.microsoft.com/azure/ai-services/openai/concepts/models

version: 1

models:
  planner:
    provider: azure_openai
    deployment: gpt-4o
    api_version: "2025-01-01-preview"
    max_tokens: 8192
    timeout_s: 180
    retries: 3
  critic:
    provider: azure_openai
    deployment: gpt-4o
    api_version: "2025-01-01-preview"
    max_tokens: 4096
    timeout_s: 120
    retries: 2
  implementer:
    provider: azure_openai
    deployment: gpt-4o
    api_version: "2025-01-01-preview"
    max_tokens: 8192
    timeout_s: 900
    retries: 1
    max_turns: 40
    max_concurrency: 1
  verifier:
    provider: azure_openai
    deployment: gpt-4o
    api_version: "2025-01-01-preview"
    max_tokens: 8192
    timeout_s: 240
    retries: 2

pricing:
  # USD per 1M tokens — gpt-4o standard rates (verify at aka.ms/aoai-pricing).
  gpt-4o:
    input_per_mtok: 2.50
    output_per_mtok: 10.00

budget:
  default_ceiling_usd: 1.00
  # Cross-run rolling-window cap (ADR 0007). Mounts a `budget_window`
  # table on `runtime.sqlite_path` so two `pciv run` invocations from
  # the same project share the cap. Comment out (or set to null) to
  # disable cross-run enforcement; the per-run `--budget` still applies.
  # `window` is `monthly` (YYYY-MM, UTC) or `daily` (YYYY-MM-DD, UTC).
  monthly_cap_usd: 60.00
  window: monthly
  # Rough projection inputs used before any network call.
  projection:
    plan_input_tokens: 4000
    plan_output_tokens: 3000
    critique_input_tokens: 5000
    critique_output_tokens: 1500
    implement_input_tokens_per_subtask: 24000
    implement_output_tokens_per_subtask: 8000
    verify_input_tokens: 12000
    verify_output_tokens: 2000
    expected_subtasks: 3

iteration:
  max_rounds: 3
  max_plan_revisions: 2

gates:
  approve_plan:
    enabled: true
    default: approve
  approve_merge:
    enabled: true
    default: reject

telemetry:
  service_name: pciv
  # If unset, exporter falls back to console.
  app_insights_connection_string_env: APPLICATIONINSIGHTS_CONNECTION_STRING

runtime:
  state_dir: .pciv
  sqlite_path: .pciv/ledger.db
  task_trust: trusted
